<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>청·백운반 출석부</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    (function() {
      const saved = localStorage.getItem('appTheme');
      if (saved) { document.documentElement.setAttribute('data-theme', saved); }
      else { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
</head>
<body>

  <div id="toast-container"></div>

  <!-- 스플래시 -->
  <div id="appSplash">
    <div class="splash-icon-wrap">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
      </svg>
    </div>
    <div class="splash-app-title">청·백운반 출석부</div>
    <div class="splash-app-sub">강북고등학교 · 2026학년도</div>
    <div class="splash-dots">
      <div class="splash-dot"></div><div class="splash-dot"></div><div class="splash-dot"></div>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="app-header">
    <div style="width:72px;"></div>
    <div class="header-title" onclick="handleHeaderClick()" style="cursor:default;">청·백운반 자율학습 출석부</div>
    <div style="display:flex;align-items:center;gap:2px;flex-shrink:0;">
    <button class="header-btn" id="teacherMenuBtn" onclick="handleTeacherMenuClick()" aria-label="교사 메뉴">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="header-btn" id="themeToggleBtn" onclick="toggleTheme(event)" aria-label="테마 전환">
      <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;transition:opacity .3s,transform .4s var(--spring);">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
      </svg>
      <svg id="iconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;transition:opacity .3s,transform .4s var(--spring);">
        <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
      </svg>
    </button>
    </div>
  </div>

  <!-- 출석체크 탭 -->
  <div id="view-home" class="tab-view active">
    <div class="filter-section">
      <div class="filter-row">
        <input type="date" id="dateInput" class="cd-input" style="min-width:130px;" onchange="handleDateChange()">
        <select id="groupSelect" class="cd-select" style="min-width:100px;"
          onchange="localStorage.setItem('lastGroup', this.value); loadStudents()"></select>
        <div class="session-pill-wrap" id="sessionPillWrap"></div>
        <input type="text" id="checkerName" class="cd-input" style="min-width:110px;" placeholder="출결 확인자 성명"
          oninput="localStorage.setItem('checkerName', this.value)">
      </div>
      <!-- 방과후 없는 날 토글 — 오후 자율학습 세션에서만 표시 -->
      <div id="afterSchoolRow" style="display:none;justify-content:center;align-items:center;gap:10px;padding-bottom:10px;">
        <button class="cd-sw" id="afterSchoolSw" onclick="toggleAfterSchool()" aria-label="방과후 없는 날">
          <div class="cd-sw-thumb"></div>
        </button>
        <span style="font-size:13px;font-weight:700;color:var(--ink-3);" id="afterSchoolLbl">방과후 없는 날</span>
      </div>
    </div>
    <div class="main-container">
      <div class="dashboard-wrapper">
        <div id="dashboardWidget">
          <div class="dash-item"><span class="dash-num blue" id="dashTotal">0</span><span style="font-size:12px;color:var(--ink-3)">총원</span></div>
          <div class="dash-div"></div>
          <div class="dash-item"><span class="dash-num green" id="dashPresent">0</span><span style="font-size:12px;color:var(--ink-3)">출석</span></div>
          <div class="dash-div"></div>
          <div class="dash-item"><span class="dash-num red" id="dashAbsent">0</span><span style="font-size:12px;color:var(--ink-3)">결석</span></div>
        </div>
      </div>
      <div id="studentContainer" class="student-grid"></div>
    </div>
  </div>

  <!-- 명단 탭 -->
  <div id="view-roster" class="tab-view">
    <div class="view-filter-bar" style="padding:10px 14px;">
      <div class="roster-pill-wrap" id="rosterPillWrap" style="flex:1;"></div>
    </div>
    <div class="main-container" id="rosterContainer">
      <div class="text-center py-5" style="color:var(--ink-3);font-weight:600;">명단을 불러오는 중...</div>
    </div>
  </div>

  <!-- 통계 탭 -->
  <div id="view-stats" class="tab-view">
    <div class="view-filter-bar">
      <select id="filterStudyGroup" class="cd-select" onchange="filterStats()"></select>
      <select id="filterClass"      class="cd-select" onchange="filterStats()"></select>
    </div>
    <div class="container py-4">
      <div class="top3-card">
        <div style="font-size:12px;font-weight:700;letter-spacing:0.5px;color:var(--amber);margin-bottom:10px;">🏆 1학년 1학기 청·백운반 누적 자습 시간 Top 3</div>
        <div id="top3Container" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        누적 자율학습 통계
      </div>
      <div class="table-responsive custom-table-container">
        <table class="table table-hover align-middle text-center mb-0">
          <thead>
            <tr style="background:var(--bg-deep);">
              <th onclick="handleSort('ban')" style="cursor:pointer;">반 ↕</th>
              <th>번호</th><th>이름</th><th>자습반</th>
              <th onclick="handleSort('total')"        style="cursor:pointer;">누적 시간 ↕</th>
              <th onclick="handleSort('attendRate')"   style="cursor:pointer;">출석률 ↕</th>
              <th onclick="handleSort('absentCount')"  style="cursor:pointer;">누적 결석 ↕</th>
            </tr>
          </thead>
          <tbody id="statsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 시간표 탭 -->
  <div id="view-schedule" class="tab-view">
    <div class="view-filter-bar" style="flex-direction:column;align-items:stretch;gap:8px;">
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="scheduleGroupSelect" class="cd-select" style="flex:1;" onchange="updateGroupScheduleView()"></select>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
          <button id="schedEditBtn" onclick="toggleScheduleEditMode()" style="padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--bg-deep);background:var(--surface);color:var(--ink-3);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:var(--sh-xs);transition:all .2s;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            편집
          </button>
          <button class="cd-btn cd-btn-primary" onclick="window.print()" style="padding:8px 16px;font-size:13px;border-radius:var(--radius-sm);">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            인쇄
          </button>
        </div>
      </div>
      <input type="text" id="schSearchInput" class="cd-input" placeholder="학생 이름 검색" style="width:100%;box-sizing:border-box;" oninput="filterSchByName(this.value)">
    </div>
    <div class="container py-4">
      <div id="schTitle" style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        주간 자습 편성표
      </div>
      <div class="sch-pill-wrap">
        <div class="sch-pill-bar">
          <div class="sch-pill-indicator" id="schPillIndicator"></div>
          <div class="sch-pill-item active" id="schTab-all" onclick="switchSchTab('all')">전체</div>
          <div class="sch-pill-item"        id="schTab-day" onclick="switchSchTab('day')">요일별</div>
        </div>
      </div>
      <div id="schView-all">
        <div id="scheduleCardList" class="sch-card-list">
          <div class="text-center py-5" style="color:var(--ink-3);font-weight:600;">자습반을 선택하세요.</div>
        </div>
      </div>
      <div id="schView-day" style="display:none;">
        <div class="sch-day-tabs" id="schDayTabs">
          <div class="sch-day-tab active" onclick="switchSchDay(0)">월</div>
          <div class="sch-day-tab"        onclick="switchSchDay(1)">화</div>
          <div class="sch-day-tab"        onclick="switchSchDay(2)">수</div>
          <div class="sch-day-tab"        onclick="switchSchDay(3)">목</div>
          <div class="sch-day-tab"        onclick="switchSchDay(4)">금</div>
          <div class="sch-day-tab"        onclick="switchSchDay(5)">토</div>
        </div>
        <div class="sch-sess-filter">
          <div class="ssf-chips" id="schSessChips"></div>
          <button class="ssf-reset" id="schSessReset" onclick="resetSchSessFilter()" title="필터 초기화">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
        </div>
        <div class="sch-day-card" id="schDayContent"></div>
      </div>
    </div>
  </div>

  <!-- 규정 위반 등록 FAB (명단 탭에서만 표시) -->
  <button class="roster-fab" id="rosterFab" onclick="openViolFabSheet()" aria-label="규정 위반 등록">
    <div class="roster-fab-tip">규정 위반 등록</div>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </button>

  <!-- 액션바 (출석체크 탭) -->
  <div class="action-bar-wrapper" id="homeActionBar">
    <button class="btn-action-sub" onclick="viewAllResults()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
      </svg>
      결과보기
    </button>
    <button id="btnSave" class="btn-action-main" data-save-state="idle" onclick="submitAttendance()">
      <div class="rsb-bar" id="saveBtnBar"></div>
      <div class="rsb-label" id="saveBtnLabel">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
        <span id="saveBtnText">출석 저장</span>
      </div>
    </button>
  </div>

  <!-- 잠금 알림 칩 -->
  <div id="lockChip">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <span>저장 잠금 상태 — 해제 후 수정하세요</span>
  </div>

  <!-- 하단 탭바 (4탭) -->
  <div class="bottom-tab-bar-wrap">
    <div class="bottom-tab-bar">
      <div class="tab-indicator-fluid" id="tabIndicatorFluid"></div>
      <div class="tab-item active" id="tab-home"     onclick="switchTab('home')">출석체크</div>
      <div class="tab-item"        id="tab-roster"   onclick="switchTab('roster')">명단</div>
      <div class="tab-item"        id="tab-stats"    onclick="switchTab('stats')">통계</div>
      <div class="tab-item"        id="tab-schedule" onclick="switchTab('schedule')">시간표</div>
    </div>
  </div>

  <!-- 결과 모달 -->
  <div class="modal fade modal-glass" id="resultModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title" style="display:flex;align-items:center;gap:7px;font-size:15px;font-weight:800;color:var(--ink);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
            전체 결과
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;">
          <div id="reportPreview" class="flex-grow-1" style="overflow-y:auto;"></div>
          <div id="resultBox" style="display:none;white-space:pre-wrap;"></div>
          <div class="mt-3">
            <button class="copy-btn-report w-100" onclick="copyResult()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              텍스트 복사
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js?v=20260720c"></script>
  <script src="js/api.js?v=20260720c"></script>
  <script src="js/app.js?v=20260720c"></script>

</body>
</html>
